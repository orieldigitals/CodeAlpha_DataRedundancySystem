<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Record</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning">

<h2 class="text-center">

Edit Record

</h2>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Name

</label>

<input
class="form-control"
type="text"
name="name"
value="{{ record.name }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input
class="form-control"
type="email"
name="email"
value="{{ record.email }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Phone

</label>

<input
class="form-control"
type="text"
name="phone"
value="{{ record.phone }}"
required>

</div>

<button
class="btn btn-success w-100"
type="submit">

Update Record

</button>

</form>

<br>

<a
href="/"
class="btn btn-secondary w-100">

Back to Dashboard

</a>

</div>

</div>

</div>

</body>

</html>
